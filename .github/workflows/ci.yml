name: SIG-SOLS CI

on: [push, pull_request]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: sig_sols
          POSTGRES_PASSWORD: sig_sols_secret
          POSTGRES_DB: sig_sols
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sig_sols"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Migrate & test
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: sig_sols
          POSTGRES_USER: sig_sols
          POSTGRES_PASSWORD: sig_sols_secret
          SECRET_KEY: ci-secret
          DEBUG: '1'
        run: |
          python manage.py migrate --noinput
          pytest --cov=apps --cov-fail-under=50
