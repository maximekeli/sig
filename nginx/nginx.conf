worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Résolution DNS Docker à chaque requête (évite l'ancien conteneur web orphelin).
    resolver 127.0.0.11 valid=10s ipv6=off;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=500r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;

    server {
        listen 80;
        server_name localhost;

        set $django_host dusol_sig_web;

        location /static/ {
            alias /usr/share/nginx/static/;
        }

        location /media/ {
            alias /usr/share/nginx/media/;
        }

        location /frontend/ {
            alias /usr/share/nginx/html/frontend/;
        }

        location / {
            root /usr/share/nginx/html/frontend;
            try_files $uri $uri/ /index.html;
        }

        location /ws/ {
            proxy_pass http://$django_host:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/v1/auth/(login|register)/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://$django_host:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://$django_host:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /admin/ {
            proxy_pass http://$django_host:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /health/ {
            proxy_pass http://$django_host:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
