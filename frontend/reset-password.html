<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réinitialisation — SIG Sols</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1 class="panel-title">Nouveau mot de passe</h1>
    <p class="panel-lead">Choisissez un mot de passe sécurisé (8 caractères minimum)</p>
    <input type="password" id="new-pass" placeholder="Nouveau mot de passe" />
    <input type="password" id="new-pass2" placeholder="Confirmer" />
    <button type="button" id="btn-reset-confirm">Réinitialiser</button>
    <p id="reset-msg" class="auth-message"></p>
    <a href="index.html">Retour à l'application</a>
  </main>
  <script type="module">
    import { createApiClient } from './js/core/apiClient.js';
    const client = createApiClient({ baseUrl: location.origin + '/api/v1', storage: localStorage });
    const params = new URLSearchParams(location.search);
    document.getElementById('btn-reset-confirm').onclick = async () => {
      const msg = document.getElementById('reset-msg');
      try {
        await client.api('/platform/password/reset/confirm/', {
          method: 'POST',
          body: JSON.stringify({
            token: params.get('token'),
            new_password: document.getElementById('new-pass').value,
            new_password_confirm: document.getElementById('new-pass2').value,
          }),
        });
        msg.textContent = 'Mot de passe mis à jour — vous pouvez vous connecter.';
        msg.className = 'auth-message success';
      } catch (e) {
        msg.textContent = e.message;
        msg.className = 'auth-message error';
      }
    };
  </script>
</body>
</html>
