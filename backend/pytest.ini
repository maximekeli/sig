[pytest]
DJANGO_SETTINGS_MODULE = config.settings
pythonpath = apps .
python_files = tests.py test_*.py *_tests.py
addopts = -v --tb=short -m "not nasa_live and not gemini_live" --reuse-db
markers =
    nasa_live: tests d'intégration NASA (réseau + credentials .env)
    gemini_live: test réel API Gemini (GEMINI_LIVE_TESTS=1 + GEMINI_API_KEY)
