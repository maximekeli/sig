# SIG-SOLS-TOGO-2026-01 — DUSOL / DISIA
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sig_sols}
      POSTGRES_USER: ${POSTGRES_USER:-sig_sols}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sig_sols_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sig_sols}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dusol_projet-web
    # Important: ne pas fixer container_name (évite les conflits / orphelins)
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    networks:
      default:
        aliases:
          - web
          - dusol_sig_web
    volumes:
      - ./backend:/app
      - ./.env:/opt/dusol.env:ro
      - media_data:/app/media
      - ./data/nasa_cache:/app/data/nasa_cache
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CHANNELS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      DB_CONN_MAX_AGE: "60"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      CSRF_TRUSTED_ORIGINS: http://localhost:8081,http://127.0.0.1:8081,http://localhost,http://127.0.0.1
      NASA_EARTHDATA_USERNAME: ${NASA_EARTHDATA_USERNAME:-}
      NASA_EARTHDATA_PASSWORD: ${NASA_EARTHDATA_PASSWORD:-}
      NASA_EARTHDATA_TOKEN: ${NASA_EARTHDATA_TOKEN:-}
      # Sentinel Hub : valeurs lues depuis .env via env_file (ne pas surcharger ici)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    image: dusol_projet-web
    entrypoint: []
    command: celery -A config worker -l info --concurrency=${CELERY_CONCURRENCY:-8}
    volumes:
      - ./backend:/app
      - ./data/nasa_cache:/app/data/nasa_cache
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      web:
        condition: service_started

  celery-beat:
    image: dusol_projet-web
    entrypoint: []
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      NASA_EARTHDATA_USERNAME: ${NASA_EARTHDATA_USERNAME:-}
      NASA_EARTHDATA_PASSWORD: ${NASA_EARTHDATA_PASSWORD:-}
      NASA_EARTHDATA_TOKEN: ${NASA_EARTHDATA_TOKEN:-}
    depends_on:
      celery:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html/frontend:ro
      - media_data:/usr/share/nginx/media:ro
      - ./backend/staticfiles:/usr/share/nginx/static:ro
    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
  media_data:
