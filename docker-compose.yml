# SIG-SOLS-TOGO-2026-01 — DUSOL / DISIA
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sig_sols}
      POSTGRES_USER: ${POSTGRES_USER:-sig_sols}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sig_sols_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sig_sols}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dusol_projet-web
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - ./data/nasa_cache:/app/data/nasa_cache
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    image: dusol_projet-web
    entrypoint: []
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - ./data/nasa_cache:/app/data/nasa_cache
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      web:
        condition: service_started

  celery-beat:
    image: dusol_projet-web
    entrypoint: []
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      celery:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html/frontend:ro
      - media_data:/usr/share/nginx/media:ro
      - ./backend/staticfiles:/usr/share/nginx/static:ro
    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
  media_data:
