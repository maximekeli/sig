<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="SIG Sols Togo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061a12"/>
      <stop offset="45%" stop-color="#0d2818"/>
      <stop offset="100%" stop-color="#1a3d2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="35%" stop-color="#e8d5a3"/>
      <stop offset="50%" stop-color="#f5e6c8"/>
      <stop offset="65%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#6b5218"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="55%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="220" rx="18" fill="url(#bg)"/>
  <rect width="900" height="220" rx="18" fill="url(#shine)" opacity="0.4">
    <animate attributeName="x" from="-900" to="900" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Particules flottantes -->
  <circle cx="120" cy="60" r="3" fill="#c9a962" opacity="0.7">
    <animate attributeName="cy" values="60;48;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="140" r="2.5" fill="#4ade80" opacity="0.6">
    <animate attributeName="cy" values="140;125;140" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="45" r="2" fill="#c9a962" opacity="0.5">
    <animate attributeName="cx" values="650;660;650" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="170" r="2" fill="#86efac" opacity="0.55">
    <animate attributeName="cy" values="170;158;170" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Ligne carte stylisée -->
  <path d="M60 160 Q200 120 350 150 T620 130 T820 155" fill="none" stroke="#2d8a52" stroke-width="2" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="400" to="0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dasharray" values="8 12" dur="0.01s" fill="freeze"/>
  </path>
  <text x="450" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="url(#gold)" filter="url(#glow)">SIG Sols Togo</text>
  <text x="450" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" letter-spacing="6" fill="#a7c4b5">DUSOL · DISIA · RÉGION MARITIME</text>
  <text x="450" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6ee7b7" opacity="0.85">
    <tspan>PostGIS</tspan><tspan fill="#c9a962"> Ć </tspan><tspan>NASA</tspan><tspan fill="#c9a962"> Ć </tspan><tspan>Sentinel-2</tspan><tspan fill="#c9a962"> Ć </tspan><tspan>OpenWeather</tspan><tspan fill="#c9a962"> Ć </tspan><tspan>IA</tspan>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </text>
  <!-- Anneau pulse -->
  <circle cx="450" cy="95" r="72" fill="none" stroke="#c9a962" stroke-width="1" opacity="0.25">
    <animate attributeName="r" values="68;78;68" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
